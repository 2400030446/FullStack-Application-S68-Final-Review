services:
  # Database
  - type: psql
    name: render-postgres
    plan: free
    postgresMajorVersion: 15

  # Spring Boot Backend
  - type: web
    name: backend-service
    env: docker
    plan: free
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: render-postgres
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: render-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: render-postgres
          property: password

  # React Vite Frontend
  - type: web
    name: frontend-site
    env: static
    plan: free
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: backend-service
          property: host
