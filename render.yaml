databases:
  - name: render-postgres
    databaseName: lms_db
    user: lms_user
    plan: free

services:
  # Spring Boot Backend
  - type: web
    name: backend-service
    env: docker
    plan: free
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: render-postgres
          property: connectionString

  # React Vite Frontend
  - type: static
    name: frontend-site
    

    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: backend-service
          property: host
